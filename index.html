<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Profile</title>
    <style>
        /* CSS Variables for easy customization */
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent-color: #2563eb; /* Primary theme color */
            --accent-hover: #1d4ed8;
            --border-radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 40px 30px;
            text-align: center;
        }

        .profile-img-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid var(--accent-color);
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.025em;
        }

        .title {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .company {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 24px 0;
        }

        .info-section {
            text-align: left;
            margin-bottom: 28px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item svg {
            width: 20px;
            height: 20px;
            margin-right: 14px;
            color: var(--accent-color);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .info-value {
            color: var(--text-muted);
            line-height: 1.4;
        }

        .info-value a {
            color: inherit;
            text-decoration: none;
            transition: color 0.15s;
        }

        .info-value a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.15s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Profile Image (Replace emoji with <img src="your-image.jpg" class="profile-img"> if you want an actual photo) -->
        <div class="profile-img-container">
            <!-- div class="profile-img">👤</div> -->
             <img src="pic.jpeg" class="profile-img" alt="Sutharsan">
        </div>

        <h1>Sutharsan Kumar Krisnamoorthy</h1>
        <p class="title">Consultant</p>
        <p class="company">Dhayapala</p>

        <div class="divider"></div>

        <div class="info-section">
            <!-- Address -->
            <div class="info-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <div>
                    <div class="info-label">Address</div>
                    <div class="info-value">59/1 (New 40/1) First Main Road,<br>Raja Annamalai Puram,<br>Chennai, Tamilnadu, INDIA.<br>Pincode: 600028</div>
                </div>
            </div>

            <!-- Email -->
            <div class="info-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <div>
                    <div class="info-label">Email</div>
                    <div class="info-value"><a href="mailto:sutharsan.krishnamoorthy@gmail.com">sutharsan.krishnamoorthy@gmail.com</a></div>
                </div>
            </div>

            <!-- Phone -->
            <div class="info-item">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                <div>
                    <div class="info-label">Phone</div>
                    <div class="info-value"><a href="tel:+919840715223">+91 98407 15223</a></div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://www.linkedin.com/in/sutharsankumar" target="_blank" class="btn">Connect on LinkedIn</a>
            <a href="https://ksuthars.github.io" target="_blank" class="btn btn-secondary">Visit Company Website</a>
        </div>
    </div>

</body>
</html>
